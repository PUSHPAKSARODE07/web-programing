<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    body {
        background-color: #f8f9fa;
    }
    .container {
        max-width: 406px;
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        height: fit-content;
    }
    h1 {
        margin-bottom: 20px;
    }
    table {
        width: 100%;
    }
    button {
        width: 73.5px;
        height: 50px;
        margin: 5px;
    }
    button:hover {
        transform: scale(0.95);
        transition: transform 0.1s;
        box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
    }
  </style>  
</head>
  <body>
    <h1 class="text-center mt-4">Simple Calculator</h1>
    <div class="container" style="margin-top: 50px;">
      <table class="table table-bordered">
        <tr>
            <td colspan="4">
                <input type="text" id="display" class="form-control" readonly>
            </td>
        </tr>
        <tr>
            <td>
                <button class="btn btn-success" id="calculate" onclick="calculateResult()" style="width: 250px;">=</button>
                <button class="btn btn-danger" id="clear" onclick="clearDisplay()">C</button>
            </td>
        </tr>
        <tr>
            <td>
                <button class="btn btn-primary" id="1" onclick="appendNumber('1')">1</button>
                <button class="btn btn-primary" id="2" onclick="appendNumber('2')">2</button>
                <button class="btn btn-primary" id="3" onclick="appendNumber('3')">3</button>
                <button class="btn btn-primary" id="+" onclick="setOperation('+')">+</button>  
            </td>
        </tr>
        <tr>
            <td>
                <button class="btn btn-primary" id="4" onclick="appendNumber('4')">4</button>
                <button class="btn btn-primary" id="5" onclick="appendNumber('5')">5</button>
                <button class="btn btn-primary" id="6" onclick="appendNumber('6')">6</button>
                <button class="btn btn-primary" id="-" onclick="setOperation('-')">-</button>  
            </td>
        </tr>
        <tr>
            <td>
                <button class="btn btn-primary" id="7" onclick="appendNumber('7')">7</button>
                <button class="btn btn-primary" id="8" onclick="appendNumber('8')">8</button>
                <button class="btn btn-primary" id="9" onclick="appendNumber('9')">9</button>
                <button class="btn btn-primary" id="*" onclick="setOperation('*')">*</button>
            </td>
        </tr>
        <tr>
            <td>
                <button class="btn btn-primary" id="." onclick="appendNumber('.')">.</button>
                <button class="btn btn-primary" id="0" onclick="appendNumber('0')">0</button>
                <button class="btn btn-primary" id="00" onclick="appendNumber('00')">00</button>
                <button class="btn btn-primary" id="/" onclick="setOperation('/')">/</button>
            </td>
        </tr>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

<script>
    let firstNumber = '';
    let secondNumber = '';
    let operation = null;
    let isSecondNumber = false;

    function appendNumber(number) {
        if (isSecondNumber) {
            secondNumber += number;
            document.getElementById('display').value = secondNumber;
        } else {
            firstNumber += number;
            document.getElementById('display').value = firstNumber;
        }
    }

    function setOperation(op) {
        if (firstNumber === '') return;
        operation = op;
        isSecondNumber = true;
        document.getElementById('display').value = '';
    }

    function calculateResult() {
        let result;
        const num1 = parseFloat(firstNumber);
        const num2 = parseFloat(secondNumber);

        if (isNaN(num1) || isNaN(num2)) return;

        switch (operation) {
            case '+':
                result = num1 + num2;
                break;
            case '-':
                result = num1 - num2;
                break;
            case '*':
                result = num1 * num2;
                break;
            case '/':
                if (num2 === 0) {
                    alert("Cannot divide by zero");
                    clearDisplay();
                    return;
                }
                result = num1 / num2;
                break;
            default:
                return;
        }

        document.getElementById('display').value = result;
        firstNumber = result.toString();
        secondNumber = '';
        operation = null;
        isSecondNumber = false;
    }

    function clearDisplay() {
        firstNumber = '';
        secondNumber = '';
        operation = null;
        isSecondNumber = false;
        document.getElementById('display').value = '';
    }

</script>
